<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TAKCTRL - Hydro step</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-top">
        <div class="logo">
          <img src="takctrl_logo.png" alt="TAKCTRL" class="logo-img">
        </div>
        <div class="streak-badge" id="streak-badge">
          🔥 <span id="streak-count">0</span>
        </div>
      </div>
      <p class="header-sub">Mini Health AI for Developers</p>
    </header>

    <nav class="tabs">
      <button class="tab active" data-tab="today">Dashboard</button>
      <button class="tab" data-tab="settings">Settings</button>
    </nav>

    <main>
      <section class="panel active" id="panel-today">
        <div class="ring-card">
          <div class="stats-grid">
            <div class="stat-item water">
              <div class="stat-circle">
                <svg viewBox="0 0 100 100">
                  <circle class="bg" cx="50" cy="50" r="45"></circle>
                  <circle class="progress" id="water-progress" cx="50" cy="50" r="45"></circle>
                </svg>
                <div class="stat-content">
                  <span class="stat-label">Water</span>
                  <span class="stat-value"><span id="water-count">0</span>/<span id="water-goal">8</span></span>
                </div>
              </div>
              <button class="btn btn-primary" id="btn-drink">Add Cup</button>
            </div>
            
            <div class="stat-item walk">
              <div class="stat-circle">
                <svg viewBox="0 0 100 100">
                  <circle class="bg" cx="50" cy="50" r="45"></circle>
                  <circle class="progress" id="walk-progress" cx="50" cy="50" r="45"></circle>
                </svg>
                <div class="stat-content">
                  <span class="stat-label">Walk</span>
                  <span class="stat-value"><span id="walk-done">0</span>/<span id="walk-goal">10</span></span>
                </div>
              </div>
              <button class="btn btn-secondary" id="btn-walk">Log Walk</button>
            </div>
          </div>
        </div>

        <div class="productivity-card">
          <p id="health-tip">"Hydration is the ultimate productivity hack."</p>
        </div>
      </section>

      <section class="panel" id="panel-settings">
        <div class="settings-group">
          <h3>Notification Intervals</h3>
          <div class="settings-row">
            <label for="waterTime">Water Reminder (mins)</label>
            <input type="number" id="waterTime" value="30" min="1" max="1440">
          </div>
          <div class="settings-row">
            <label for="walkTime">Walk Reminder (mins)</label>
            <input type="number" id="walkTime" value="60" min="1" max="1440">
          </div>
        </div>

        <div class="settings-group">
          <h3>Daily Goals</h3>
          <div class="settings-row">
            <label for="waterGoal">Water Goal (cups)</label>
            <input type="number" id="waterGoal" value="8" min="1">
          </div>
          <div class="settings-row">
            <label for="walkGoal">Walk Goal (times)</label>
            <input type="number" id="walkGoal" value="10" min="1">
          </div>
        </div>

        <button class="btn btn-save" id="save">Save Settings</button>
      </section>
    </main>
  </div>
  <script src="popup.js"></script>
</body>
</html>
